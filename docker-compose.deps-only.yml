# ============================================================
# docker-compose.deps-only.yml — F5-TTS-Vietnamese (biến thể mount-code)
#
# Dùng với Dockerfile.deps-only: image chỉ chứa model weights + dependencies,
# code ứng dụng được mount từ thư mục đã git clone bên ngoài — sửa code trực
# tiếp trên máy đích (vd VM công ty), chỉ cần restart container, KHÔNG rebuild.
#
# Chuẩn bị (một lần, khi còn mạng):
#   git clone <repo-url> F5-TTS-Vietnamese-scratch
#   # copy cả thư mục này sang máy đích nếu máy đích không có mạng
#
# Sử dụng trên máy đích:
#   cd F5-TTS-Vietnamese-scratch
#   docker compose -f docker-compose.deps-only.yml up -d
#   docker compose -f docker-compose.deps-only.yml logs -f
#
# Sửa code xong:
#   docker compose -f docker-compose.deps-only.yml restart
#
# LƯU Ý: image phucvh145/f5tts-vi:cu121-deps-only đã push trước đó bị baked
# docker-entrypoint.sh với CRLF (build trên Windows) — container crash ngay khi
# start với lỗi "/usr/bin/env: 'bash\r': No such file or directory". Đã fix bằng
# volume mount đè /docker-entrypoint.sh ở dưới, không cần rebuild/re-push image.
# ============================================================

services:
  f5tts:
    build:
      context: .
      dockerfile: Dockerfile.deps-only
      # ckpts/ trong project là NTFS junction — Docker không đọc xuyên qua được
      # khi build context (WSL2/Hyper-V backend). Trỏ thẳng vào ckpts thật ở
      # project gốc, khớp với "COPY --from=ckpts ./ckpts/" trong Dockerfile.deps-only.
      additional_contexts:
        ckpts: ../F5-TTS-Vietnamese/ckpts
    image: phucvh145/f5tts-vi:cu121-deps-only   # đổi theo tên image trên Docker Hub của bạn
    container_name: f5tts-vi-deps

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "7860:7860"

    working_dir: /app

    volumes:
      # Mount TOÀN BỘ code đã git-clone vào /app — sửa trực tiếp trên máy đích.
      # Model weights KHÔNG nằm trong thư mục này, nên không bị mount đè —
      # chúng ở /opt/f5tts/ckpts bên trong image (xem F5TTS_CKPTS_DIR bên dưới).
      - ./:/app
      # Output audio riêng ra ngoài container (tùy chọn, đã nằm trong ./tests
      # nếu mount cả thư mục ở trên, dòng này chỉ cần nếu muốn tách output ra
      # ngoài đường dẫn code, vd ổ đĩa khác):
      # - /path/to/output:/app/tests

      # Ghi đè /docker-entrypoint.sh đã baked trong image cu121-deps-only (image
      # này được build lúc docker-entrypoint.sh còn CRLF trên máy Windows — Linux
      # không chạy được shebang "#!/usr/bin/env bash\r", lỗi
      # "/usr/bin/env: 'bash\r': No such file or directory" ngay khi container
      # start). File trong repo đã fix về LF (xem .gitattributes) — mount đè lên
      # để dùng bản đã fix mà KHÔNG cần rebuild lại image ~10GB. Nếu build lại
      # image từ đầu (image mới không còn dính bug này) thì dòng mount này thành
      # dư thừa nhưng vô hại (mount đúng nội dung y hệt đã baked).
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro

    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      GRADIO_ANALYTICS_ENABLED: "0"
      PYTHONIOENCODING: "utf-8"
      CUDA_VISIBLE_DEVICES: "0"
      # Model weights baked sẵn trong image ở đây — KHÔNG đổi trừ khi bạn tự
      # sửa Dockerfile.deps-only.
      F5TTS_CKPTS_DIR: /opt/f5tts/ckpts

      # Tùy chọn: nếu KHÔNG mount ./:/app ở trên mà muốn container tự kéo code
      # (cần container reach được Git remote — nội bộ/qua proxy công ty):
      # GIT_REPO_URL: "https://github.com/your-org/F5-TTS-Vietnamese-scratch.git"
      # GIT_REPO_BRANCH: "main"

      # LLM server tự host — Qwen2.5:3b trên Ollama laptop chỉ là placeholder mặc
      # định trong code, đổi 3 biến dưới để trỏ sang LLM thật (Ollama/vLLM/LM
      # Studio/Xinference... đều dùng chung API OpenAI-compatible).
      OLLAMA_URL: "http://YOUR_LLM_HOST:PORT/v1"
      OLLAMA_MODEL: "your-model-name"
      LLM_API_KEY: ""

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
